services:
  eternelle.api:
    image: ${DOCKER_REGISTRY-}eternelleapi
    container_name: Eternelle.Api
    build:
      context: .
      dockerfile: src/API/Eternelle.Api/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081
    depends_on:
      eternelle.database:
        condition: service_healthy
      eternelle.redis:
        condition: service_healthy
      eternelle.minio:
        condition: service_healthy

  eternelle.database:
    image: postgres:17
    container_name: Eternelle.Database
    environment:
      - POSTGRES_DB=eternelle
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/db:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eternelle"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  eternelle.redis:
    image: redis:latest
    container_name: Eternelle.Redis
    restart: always
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  eternelle.seq:
    image: datalust/seq:latest
    container_name: Eternelle.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - 5341:5341
      - 127.0.0.1:8081:80

  eternelle.minio:
    image: minio/minio:latest
    container_name: Eternelle.MinIO
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./.containers/minio:/data
    ports:
      - 127.0.0.1:9000:9000
      - 127.0.0.1:9001:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  eternelle.jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: Eternelle.Jaeger
    ports:
      - 4317:4317
      - 4318:4318
      - 16686:16686
